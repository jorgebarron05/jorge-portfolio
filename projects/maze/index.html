<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maze — Jorge Barron</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="back-nav">
    <a href="../../index.html" class="back-link">← Back to Portfolio</a>
  </nav>

  <main>

    <header class="game-header">
      <h1 class="game-title">Maze</h1>
      <p class="game-subtitle">Navigate from <strong style="color:#8FAD88">S</strong> to <strong style="color:#D4A835">E</strong>. Use arrow keys or let BFS / DFS solve it.</p>
    </header>

    <div class="settings-panel">
      <div class="setting-row">
        <label class="setting-label" for="maze-w-input">Width <span id="maze-w-display">25</span></label>
        <input type="range" id="maze-w-input" min="10" max="40" value="25" step="5">
      </div>
      <div class="setting-row">
        <label class="setting-label" for="maze-h-input">Height <span id="maze-h-display">18</span></label>
        <input type="range" id="maze-h-input" min="8" max="30" value="18" step="2">
      </div>
    </div>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">Steps</span>
        <span class="hud-value" id="step-val">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Size</span>
        <span class="hud-value" id="size-val">25×18</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="maze-canvas"></canvas>
    </div>

    <div class="action-buttons">
      <button class="game-btn primary" id="btn-reset">↺ New Maze</button>
      <button class="game-btn" id="btn-bfs">BFS Solve</button>
      <button class="game-btn" id="btn-dfs">DFS Solve</button>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#CBDF90"></div>
        Player
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(77,124,138,0.55)"></div>
        Solution path
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(143,173,136,0.55)"></div>
        Start
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(212,168,53,0.55)"></div>
        End
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#0e2040"></div>
        Visited
      </div>
    </div>

    <div class="controls">
      <span>↑↓←→</span> move · <span>B</span> BFS · <span>D</span> DFS · <span>R</span> new maze
    </div>

    <p class="credit">Originally built in Java · CS2510, Northeastern University<br>Jorge Barron &amp; Tri Watanasuparp</p>

  </main>

  <!-- game.js must load before ui.js -->
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
